server {
    listen 80;
    server_name sealandlogisticsgroup.com www.sealandlogisticsgroup.com; # Replace with your domain

    client_max_body_size 100M;

    # Admin Panel (served from /admin subfolder)
    location /admin {
        alias /var/www/sealand/client/dist/admin;
        try_files $uri $uri/ /admin/index.html;
    }

    # Main Website (Frontend)
    location / {
        root /var/www/sealand/client/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API Proxy
    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Uploaded Files
    location /uploads {
        alias /var/www/sealand/server/uploads;
    }
}
